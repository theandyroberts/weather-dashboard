<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    :root {
      --bg: #0a0f1e;
      --card: #111827;
      --card-border: rgba(255,255,255,0.07);
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --text: #f1f5f9;
      --muted: #64748b;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 8px;
    }

    #status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    #status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient);
      border-radius: 20px 20px 0 0;
    }

    .card-knoxville { --gradient: linear-gradient(90deg, #f97316, #ef4444); }
    .card-annapolis { --gradient: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .card-santamonica { --gradient: linear-gradient(90deg, #f59e0b, #ec4899); }

    .city-name {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .state-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }

    .temp-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
    }

    .temp-main {
      font-size: 72px;
      font-weight: 200;
      line-height: 1;
      color: var(--text);
    }

    .temp-unit {
      font-size: 24px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .weather-desc {
      flex: 1;
      text-align: right;
    }

    .weather-emoji {
      font-size: 48px;
      line-height: 1;
      display: block;
    }

    .weather-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      border-top: 1px solid var(--card-border);
      padding-top: 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .feels-like {
      position: absolute;
      top: 28px;
      right: 28px;
      text-align: right;
    }

    .feels-like-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .feels-like-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .loading-card {
      opacity: 0.5;
    }

    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #2d3748 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }

    #countdown {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

<header>
  <h1>Weather Dashboard</h1>
  <p>Live conditions across three cities</p>
  <div id="status">
    <span class="dot"></span>
    <span>Last updated: <span id="last-updated">Loading...</span> · Next refresh in <span id="countdown">30:00</span></span>
  </div>
</header>

<div class="grid" id="grid">
  <div class="card card-knoxville loading-card" id="card-knoxville">
    <div class="city-name">Knoxville</div>
    <div class="state-name">Tennessee</div>
    <div class="skeleton" style="height:72px;width:140px;margin-bottom:20px"></div>
    <div class="stats">
      <div class="skeleton" style="height:40px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div>
  </div>
  <div class="card card-annapolis loading-card" id="card-annapolis">
    <div class="city-name">Annapolis</div>
    <div class="state-name">Maryland</div>
    <div class="skeleton" style="height:72px;width:140px;margin-bottom:20px"></div>
    <div class="stats">
      <div class="skeleton" style="height:40px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div>
  </div>
  <div class="card card-santamonica loading-card" id="card-santamonica">
    <div class="city-name">Santa Monica</div>
    <div class="state-name">California</div>
    <div class="skeleton" style="height:72px;width:140px;margin-bottom:20px"></div>
    <div class="stats">
      <div class="skeleton" style="height:40px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div>
  </div>
</div>

<footer>
  Weather data from <a href="https://open-meteo.com" target="_blank">Open-Meteo</a> · Updates every 30 minutes
</footer>

<script>
const CITIES = [
  {
    id: 'knoxville',
    name: 'Knoxville',
    state: 'Tennessee',
    lat: 35.9606,
    lon: -83.9207,
    tz: 'America/New_York',
  },
  {
    id: 'annapolis',
    name: 'Annapolis',
    state: 'Maryland',
    lat: 38.9784,
    lon: -76.4922,
    tz: 'America/New_York',
  },
  {
    id: 'santamonica',
    name: 'Santa Monica',
    state: 'California',
    lat: 34.0195,
    lon: -118.4912,
    tz: 'America/Los_Angeles',
  },
];

function weatherEmoji(code) {
  if (code === 0) return ['☀️', 'Clear'];
  if (code <= 2) return ['🌤️', 'Partly Cloudy'];
  if (code <= 3) return ['☁️', 'Overcast'];
  if (code <= 49) return ['🌫️', 'Foggy'];
  if (code <= 59) return ['🌦️', 'Drizzle'];
  if (code <= 69) return ['🌧️', 'Rain'];
  if (code <= 79) return ['🌨️', 'Snow'];
  if (code <= 84) return ['🌧️', 'Rain Showers'];
  if (code <= 94) return ['⛈️', 'Thunderstorm'];
  return ['⛈️', 'Thunderstorm'];
}

async function fetchWeather(city) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m,apparent_temperature&temperature_unit=fahrenheit&windspeed_unit=mph&timezone=${city.tz}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.current;
}

function renderCard(city, current) {
  const [emoji, label] = weatherEmoji(current.weathercode);
  const card = document.getElementById(`card-${city.id}`);
  card.classList.remove('loading-card');
  card.innerHTML = `
    <div class="city-name">${city.name}</div>
    <div class="state-name">${city.state}</div>
    <div class="feels-like">
      <div class="feels-like-label">Feels like</div>
      <div class="feels-like-value">${Math.round(current.apparent_temperature)}°F</div>
    </div>
    <div class="temp-row">
      <div class="temp-main">${Math.round(current.temperature_2m)}</div>
      <div class="temp-unit">°F</div>
      <div class="weather-desc">
        <span class="weather-emoji">${emoji}</span>
        <div class="weather-label">${label}</div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">💨 Wind</div>
        <div class="stat-value">${Math.round(current.windspeed_10m)} mph</div>
      </div>
      <div class="stat">
        <div class="stat-label">💧 Humidity</div>
        <div class="stat-value">${current.relative_humidity_2m}%</div>
      </div>
    </div>
  `;
}

async function fetchAll() {
  const results = await Promise.allSettled(CITIES.map(fetchWeather));
  results.forEach((result, i) => {
    if (result.status === 'fulfilled') {
      renderCard(CITIES[i], result.value);
    }
  });
  const now = new Date();
  document.getElementById('last-updated').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
}

// Countdown timer
let secondsLeft = 1800;
function updateCountdown() {
  const m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
  const s = (secondsLeft % 60).toString().padStart(2, '0');
  document.getElementById('countdown').textContent = `${m}:${s}`;
  secondsLeft--;
  if (secondsLeft < 0) {
    secondsLeft = 1800;
    fetchAll();
  }
}

fetchAll();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
